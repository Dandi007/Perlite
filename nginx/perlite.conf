# 自包含 nginx 配置：供 svc perlite 以 `nginx -p .../nginx -c perlite.conf` 拉起。
# daemon off 让 nginx 留在前台，由 svc wrapper supervisor 管理生命周期。
# 镜像 display-nginx 的自包含模式。
worker_processes 1;
daemon off;
error_log /Users/uther/services/perlite/nginx/error.log warn;
pid /Users/uther/services/perlite/nginx/nginx.pid;

events { worker_connections 256; }

http {
  include /opt/homebrew/etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /Users/uther/services/perlite/nginx/access.log;
  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  server {
    listen 127.0.0.1:8088;
    server_name notes.qinglinzhang.top;

    root /Users/uther/services/perlite/perlite;
    index index.php index.html;

    location / {
      try_files $uri $uri/ /index.php;
    }

    # PWA manifest：nginx mime.types 不含 .webmanifest，显式给正确 content-type。
    location = /manifest.webmanifest {
      default_type application/manifest+json;
    }

    # PHP-FPM
    location ~ \.php$ {
      try_files $uri =404;
      fastcgi_split_path_info ^(.+\.php)(/.+)$;
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_index index.php;
      include /opt/homebrew/etc/nginx/fastcgi_params;
      fastcgi_param REQUEST_URI $request_uri;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param PATH_INFO $fastcgi_path_info;
      # local-patch: 动态 HTML(index.php/content.php)禁 HTTP 缓存,否则更新文档后
      # 浏览器/iOS PWA 对同一 mdfile URL 启发式缓存旧渲染,看不到最新内容。
      add_header Cache-Control "no-store" always;
    }

    # Obsidian appearance/theme 资源放行（Perlite 需要）
    location ~* ^/(.*)/.obsidian/appearance.json$ { allow all; }
    location ~* ^/(.*)/.obsidian/(.*)/(.*).css$ { allow all; }
    location ~* ^/(.*)/.obsidian/(.*)/(.*).map$ { allow all; }

    # 安全：挡 .md/.json 裸读 + 隐藏 .git/.obsidian/.trash
    location ~ /\.ht { deny all; }
    location ~ \.(git|github|obsidian|trash) { deny all; }
    location ~ \.(md|json)$ { deny all; }
  }
}
